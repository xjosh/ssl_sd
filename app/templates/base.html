<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SSL SD{% endblock %}</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 600; letter-spacing: .03em; }
    .scan-badge { font-size: .7rem; }
    .expiry-ok      { color: #198754; }
    .expiry-warn    { color: #fd7e14; }
    .expiry-danger  { color: #dc3545; font-weight: 600; }
    .expiry-expired { color: #dc3545; text-decoration: line-through; }
    .expiry-na      { color: #6c757d; }
    table th { white-space: nowrap; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">SSL SD</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#nav" aria-controls="nav" aria-expanded="false">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path.startswith('/targets') %}active{% endif %}" href="/targets">Targets</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path.startswith('/scans') %}active{% endif %}" href="/scans">Scan History</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path.startswith('/specs') %}active{% endif %}" href="/specs">Scan Scope</a>
        </li>
      </ul>
      <span class="navbar-text me-3">
        {% if scanning %}
          <span class="badge bg-warning text-dark scan-badge">Scan in progress&hellip;</span>
        {% endif %}
        <a href="/sd" class="btn btn-sm btn-outline-light ms-2" target="_blank">/sd</a>
        <a href="/docs" class="btn btn-sm btn-outline-secondary ms-1" target="_blank">API</a>
      </span>
    </div>
  </div>
</nav>

<div class="container-fluid px-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmCWzb3EHy/4N1gFa2KGq1FXFvfL"
        crossorigin="anonymous"></script>
{% block scripts %}{% endblock %}
</body>
</html>
